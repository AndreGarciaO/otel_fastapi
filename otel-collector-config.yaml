receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  batch:

exporters:
  otlp_http:
    endpoint: ${DT_ENDPOINT}
    headers:
      Authorization: "Api-Token ${DT_API_TOKEN}"

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp_http]

    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp_http]

    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp_http]
